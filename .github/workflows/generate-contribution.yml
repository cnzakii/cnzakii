name: Generate Contribution

on:
  schedule:
    - cron: "0 10 * * *"

  workflow_dispatch:

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Generate github-contribution-grid-snake.svg
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            profile-snake-contribution/github-contribution-grid-snake.svg
            profile-snake-contribution/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Commit & Push
        run: |
          git config --global user.name "zaki"
          git config --global user.email "cnzakii@gmail.com"
          git add -A
          git commit -m "generated" || echo "No changes to commit"
          git push
